; OpenMM / GROMACS MD Simulation Parameters for GFP Thermostability Screening
; 用于预筛选突变体的热稳定性（升温模拟）

[SYSTEM]
; 使用 Amber14SB 力场 + OPC 水模型
forcefield = Amber14SB
water_model = OPC
temperature = 300K      ; 初始温度
pressure = 1.0 atm      ; 标准压力
ionic_strength = 0.15 M ; NaCl

[THERMOSTABILITY_PROTOCOL]
; 三步升温法模拟72°C热处理
step1_equilibration = 300K, 10ns, NPT
step2_annealing = 300K -> 350K, 5ns, linear ramp
step3_hot_hold = 350K (≈72°C+), 20ns, NVT
step4_cool_down = 350K -> 300K, 5ns, linear ramp
step5_recovery = 300K, 10ns, NPT

[ANALYSIS]
; 关键观测指标
metrics = 
    RMSF (Cα, per residue)
    Radius of Gyration (Rg)
    Chromophore RMSD (res 66-67 environment)
    Secondary structure content (DSSP)
    Hydrogen bond network (chromophore surroundings)

[CRITERIA]
; 淘汰标准（任何一条触发即排除）
exclude_if = 
    Rg_increase > 15% at 350K
    Chromophore_RMSD > 2.0 Å
    Beta_sheet_loss > 30%
    Salt_bridge_break (E222-R96 distance > 5Å)

[COMPUTATIONAL_RESOURCES]
; 建议配置
GPU = NVIDIA RTX 3090 / A100
simulation_time_per_variant = ~50 ns total
variants_to_screen = Top 20 from ESM-2 scoring
